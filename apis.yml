aid: lead-bank
url: https://raw.githubusercontent.com/api-evangelist/lead-bank/refs/heads/main/apis.yml
name: Lead Bank
kind: company
description: >-
  Lead Bank is a Kansas City-chartered FDIC-insured bank operating as a
  sponsor bank and embedded-finance infrastructure provider for fintech
  partners. The platform is organized around four product pillars - Lend
  (term loans, lines of credit, BNPL, in-app financing), Move (ACH,
  instant payments, wires, international wires, stablecoin transfers,
  payment controls), Issue (physical and virtual credit / debit cards,
  custom account numbers), and Store (FDIC-insured multi-currency deposit
  accounts). APIs and file integrations (SFTP) are documented at
  docs.lead.bank but access is gated through Lead Bank's partner-onboarding
  process. Recognized on the Forbes Next Billion-Dollar Startups and CNBC
  Disruptor 50 lists.
